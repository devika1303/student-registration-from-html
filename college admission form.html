<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Welcome To XYZ College</h1>
        <h3>Admission Form</h3>
    </header>
    <main>
        <form action="">
            <label for="name">Student Name</label>
            <input type="text" placeholder="enter your name" required>
            <br><br>
            <label for="father name">Father's Name</label>
            <input type="text" placeholder="enter your father's name" required>
            <br><br>
            <label for="number">Mobile Number</label>
            <input type="tel" placeholder="enter your mobile number" required>
            <label for="alternate">Alternate Mobile Number</label>
            <input type="tel" placeholder="enter your alternate mobile number ">
            <br><br>
            <label for="date">Date of Birth</label>
            <input type="date" required>
            <br><br>
            <label for="Course Selection">Course Selection</label>
            <select name="Course Selection" id="">
                <option>cse</option>
                <option>ece</option>
                <option>eee</option>
                <option>civil</option>
                <option>mech</option>
                <option>data science</option>
                <option>aids</option>
                <option>vlsi</option>
                <option>cs-it</option>
            </select>
            <br><br>
            <label for="address">Address</label>
            <textarea name="Address" id="" placeholder="enter your address"></textarea>
            <br><br>
            <button>
                Submit
            </button>

        </form>
    </main>
</body>
</html>
